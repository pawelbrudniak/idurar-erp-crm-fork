version: '3'

services:
  mongo:
    image: mongo:6
    container_name: idurar-mongo
    restart: always
    volumes:
      - mongo_data:/data/db

  backend:
    image: node:20.9.0
    container_name: idurar-backend
    working_dir: /app
    volumes:
      - ./backend:/app
    command: sh -c "npm install && npm run dev"
    ports:
      - "127.0.0.1:5000:8888"
    depends_on:
      - mongo

  frontend:
    image: node:20.9.0
    container_name: idurar-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - backend

volumes:
  mongo_data:
