version: '3'

services:
  mongo:
    image: mongo:6
    container_name: idurar-mongo
    restart: always
    volumes:
      - mongo_data:/data/db

  backend:
    image: node:20.9.0
    container_name: idurar-backend
    working_dir: /app
    volumes:
      - ./backend:/app
    command: sh -c "npm install && npm run dev"
    depends_on:
      - mongo
    expose:
      - "8888"

  frontend:
    image: node:20.9.0
    container_name: idurar-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - backend
    expose:
      - "3000"

volumes:
  mongo_data:
